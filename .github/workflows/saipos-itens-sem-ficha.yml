name: SAIPOS itens sem ficha

# Lista os itens sem ficha técnica (somente leitura). Disparo manual.
on:
  workflow_dispatch:
    inputs:
      include_disabled:
        description: "Incluir itens inativos"
        type: boolean
        default: false

jobs:
  ficha:
    runs-on: ubuntu-latest
    timeout-minutes: 6
    steps:
      - name: Checar credenciais Saipos
        id: creds
        env:
          SAIPOS_USER: ${{ secrets.SAIPOS_USER }}
        run: |
          if [ -z "$SAIPOS_USER" ]; then
            echo "::error::SAIPOS_USER não configurado."
            exit 1
          fi

      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - name: Install deps
        run: npm install --no-audit --no-fund
      - name: Install Playwright (Chromium)
        run: npx playwright install --with-deps chromium

      - name: Run comando
        env:
          SAIPOS_USER: ${{ secrets.SAIPOS_USER }}
          SAIPOS_PASS: ${{ secrets.SAIPOS_PASS }}
          SAIPOS_BASE_URL: ${{ secrets.SAIPOS_BASE_URL }}
          SAIPOS_STORE_IDS: ${{ secrets.SAIPOS_STORE_IDS }}
          SAIPOS_INCLUDE_DISABLED: ${{ inputs.include_disabled == true && '1' || '' }}
        run: node scripts/itens_sem_ficha.mjs

      - name: Upload relatório
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: itens-sem-ficha-${{ github.run_id }}
          path: itens-sem-ficha.md
          if-no-files-found: warn
          retention-days: 14
