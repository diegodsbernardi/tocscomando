name: SAIPOS scrape

on:
  # Cron em UTC. Brasil = UTC-3.
  # Janela: 19:00 → 23:30 BRT = 22:00 → 02:30 UTC, a cada 30min.
  schedule:
    - cron: "*/30 22,23,0,1,2 * * *"

  # Permite disparar manualmente pela UI do GitHub
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Rodar em DRY_RUN (não grava no banco)"
        type: boolean
        default: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checar credenciais Saipos
        id: creds
        env:
          SAIPOS_USER: ${{ secrets.SAIPOS_USER }}
        run: |
          if [ -z "$SAIPOS_USER" ]; then
            echo "::notice::SAIPOS_USER não configurado — pulando scrape."
            echo "ok=false" >> "$GITHUB_OUTPUT"
          else
            echo "ok=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.creds.outputs.ok == 'true'

      - uses: actions/setup-node@v4
        if: steps.creds.outputs.ok == 'true'
        with:
          node-version: "20"
          cache: npm

      - name: Install deps
        if: steps.creds.outputs.ok == 'true'
        run: npm install --no-audit --no-fund

      - name: Install Playwright (Chromium)
        if: steps.creds.outputs.ok == 'true'
        run: npx playwright install --with-deps chromium

      - name: Run scraper
        if: steps.creds.outputs.ok == 'true'
        env:
          SAIPOS_USER: ${{ secrets.SAIPOS_USER }}
          SAIPOS_PASS: ${{ secrets.SAIPOS_PASS }}
          SAIPOS_BASE_URL: ${{ secrets.SAIPOS_BASE_URL }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          DRY_RUN: ${{ inputs.dry_run == true && '1' || '' }}
        run: node scripts/scrape_saipos.mjs

      - name: Upload error screenshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: saipos-error-${{ github.run_id }}
          path: saipos-error.png
          if-no-files-found: ignore
          retention-days: 7
